<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StadiumSync - AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-white w-full max-w-md rounded-xl shadow-2xl overflow-hidden flex flex-col h-[85vh]">
        
        <div class="bg-blue-600 text-white p-4 font-bold text-xl text-center shadow-md">
            🏟️ StadiumSync AI
        </div>

        <div id="chat-box" class="flex-1 p-4 overflow-y-auto flex flex-col gap-3 bg-gray-50">
            <div class="self-start bg-blue-100 text-blue-900 p-3 rounded-lg max-w-[85%] shadow-sm">
                Hello! I am your StadiumSync AI. Ask me about gates, food stalls, or directions at the stadium!
            </div>
        </div>

        <div class="p-3 bg-white border-t flex gap-2 items-center">
            <input type="text" id="user-input" 
                   class="flex-1 border border-gray-300 rounded-full px-4 py-2 focus:outline-none focus:border-blue-500" 
                   placeholder="Type your message here..." 
                   onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()" 
                    class="bg-blue-600 text-white px-5 py-2 rounded-full hover:bg-blue-700 transition font-semibold shadow-md">
                Send
            </button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const message = inputField.value.trim();

            if (!message) return; // Don't send empty messages

            // 1. Show User's Message in Chat
            chatBox.innerHTML += `
                <div class="self-end bg-blue-600 text-white p-3 rounded-lg max-w-[85%] shadow-sm">
                    ${message}
                </div>
            `;
            inputField.value = ''; // Clear the input box
            chatBox.scrollTop = chatBox.scrollHeight; // Scroll to bottom

            // 2. Show "AI is thinking..."
            const loadingId = 'loading-' + Date.now();
            chatBox.innerHTML += `
                <div id="${loadingId}" class="self-start text-gray-500 text-sm italic p-2">
                    AI is thinking...
                </div>
            `;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // 3. Send Message to Python (Flask) Backend
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();

                // 4. Remove "thinking..." message
                document.getElementById(loadingId).remove();

                // 5. Show AI's Reply in Chat
                // Format markdown bold (**text**) to HTML bold (<b>text</b>)
                let formattedReply = data.reply.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');

                chatBox.innerHTML += `
                    <div class="self-start bg-blue-100 text-blue-900 p-3 rounded-lg max-w-[85%] shadow-sm">
                        ${formattedReply}
                    </div>
                `;
                chatBox.scrollTop = chatBox.scrollHeight;

            } catch (error) {
                document.getElementById(loadingId).remove();
                chatBox.innerHTML += `
                    <div class="self-start bg-red-100 text-red-700 p-3 rounded-lg max-w-[85%] shadow-sm">
                        Error connecting to AI. Please try again.
                    </div>
                `;
            }
        }

        // Allow sending message by pressing 'Enter' key
        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }
    </script>
</body>
</html>
